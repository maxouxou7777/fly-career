<!DOCTYPE html>
<html>
<head>
    <title>Eisy Fly Career</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        #map { height: 400px; width: 100%; border-radius: 10px; }
        body { font-family: sans-serif; background: #1a1a1a; color: white; padding: 20px; }
    </style>
</head>
<body>
    <h1>Tableau de bord</h1>
    <p>Aéroport actuel : <strong>LFPU (Moret-Épisy)</strong></p>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script>
        // Initialisation de la carte sur Moret-Épisy
        var map = L.map('map').setView([48.37, 2.78], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        L.marker([48.37, 2.78]).addTo(map).bindPopup('Vous etes ici en RV-14').openPopup();
    </script>
</body>
</html>
